<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Generator Pro</title>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --danger: #ea4335; }
        body { font-family: -apple-system, sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-size: 22px; }
        label { display: block; margin: 12px 0 6px; font-weight: 600; font-size: 14px; color: #444; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { padding: 14px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; color: white; }
        .btn-gen { background: var(--primary); width: 100%; margin-top: 10px; }
        .btn-copy { background: var(--success); }
        .btn-save { background: var(--danger); }
        button:active { transform: scale(0.98); opacity: 0.9; }
        textarea { height: 200px; margin-top: 15px; background: #fdfdfd; font-family: 'Courier New', monospace; font-size: 13px; resize: none; border-style: dashed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Gmail Alias Maker</h2>
    
    <label>Nhập Gmail gốc:</label>
    <input type="email" id="email" placeholder="Ví dụ: baoanh20100505@gmail.com">

    <label>Số lượng muốn tạo (Dấu +):</label>
    <input type="number" id="count" value="500" min="1">

    <button class="btn-gen" onclick="generate()">BẮT ĐẦU TẠO</button>
    
    <div class="btn-group">
        <button class="btn-copy" onclick="copy()">SAO CHÉP</button>
        <button class="btn-save" onclick="saveFile()">LƯU FILE .TXT</button>
    </div>

    <textarea id="result" readonly placeholder="Kết quả sẽ hiện ở đây..."></textarea>
</div>

<script>
    function generate() {
        const mail = document.getElementById('email').value.trim();
        const num = parseInt(document.getElementById('count').value);
        if(!mail.includes('@')) return alert('Lỗi: Hãy nhập đúng địa chỉ Gmail!');

        const [user, domain] = mail.split('@');
        let list = [];
        const pad = num.toString().length;

        // Tạo bí danh dấu cộng (+)
        for(let i=1; i<=num; i++) {
            list.push(`${user}+${i.toString().padStart(pad, '0')}@${domain}`);
        }
        
        // Thêm một số biến thể dấu chấm (.) cơ bản
        list.push(`\n# Biến thể bổ sung:`);
        list.push(`${user}@googlemail.com`);
        if(user.length > 1) {
            list.push(`${user[0]}.${user.substring(1)}@${domain}`);
        }

        document.getElementById('result').value = list.join('\n');
    }

    function copy() {
        const res = document.getElementById('result');
        if(!res.value) return;
        res.select();
        res.setSelectionRange(0, 99999); // Dành cho điện thoại
        navigator.clipboard.writeText(res.value);
        alert('Đã copy danh sách email!');
    }

    function saveFile() {
        const content = document.getElementById('result').value;
        if(!content) return alert('Chưa có danh sách để lưu!');

        const blob = new Blob([content], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'gmail_aliases.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        window.URL.revokeObjectURL(url);
    }
</script>

</body>
</html>
