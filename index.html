data.forEach((item,i)=>{
    correct.push(item.ops[0]);
    let ops = shuffle([...item.ops]);

    let html = `<div class="question">
    <b>${item.q}</b>
    <div class="options">`;

    ops.forEach(op=>{
        html += `<label><input type="radio" name="q${i}" value="${op}"> ${op}</label>`;
    });

    html += `</div></div>`;
    quiz.innerHTML += html;
});

// ================= CHECK =================
function checkAnswers(){
    let name = document.getElementById("username").value.trim();
    if(!name) return alert("Nhập tên!");

    let score = 0;

    data.forEach((q,i)=>{
        let pick = document.querySelector(`input[name="q${i}"]:checked`);
        if(pick && pick.value === correct[i]) score++;
    });

    document.getElementById("result").innerHTML = `Điểm: ${score}/${data.length}`;

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            chat_id:chatId,
            text:`${name} được ${score}/${data.length}`
        })
    });
}
</script>
