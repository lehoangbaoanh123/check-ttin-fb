<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn thi Quốc phòng An ninh 10</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background: #f0f2f5; max-width: 800px; margin: auto; }
        .container { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .question { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .options { display: flex; flex-direction: column; margin-top: 10px; }
        label { cursor: pointer; padding: 5px; border-radius: 4px; transition: 0.2s; }
        label:hover { background: #e7f3ff; }
        button { display: block; width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 20px; }
        button:hover { background: #218838; }
        #result { margin-top: 20px; font-weight: bold; font-size: 1.2em; text-align: center; }
        .correct { color: #28a745; }
        .incorrect { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <h1>Đề Ôn Thi Quốc Phòng 10</h1>
    <div id="quiz"></div>
    <button onclick="checkAnswers()">Nộp bài</button>
    <div id="result"></div>
</div>

<script>
    // Dữ liệu câu hỏi: Đáp án đúng luôn là phần tử đầu tiên trong mảng options
    const data = [
        { q: "1. Luật phòng chống ma túy, bao gồm:", ops: ["8 chương, 55 điều", "7 chương, 21 điều", "9 chương, 55 điều", "7 chương, 46 điều"] },
        { q: "2. Chất gây nghiện là:", ops: ["Chất kích thích hoặc ức chế thần kinh, dễ gây tình trạng nghiện", "Chất kích thích hoặc ức chế thần kinh, gây ảo giác không nghiện", "Chất an thần, hỗ trợ giảm đau nhức", "Chất hỗ trợ tiêu viêm, giảm đau, hạ sốt"] },
        { q: "3. Chất kích thích hoặc ức chế thần kinh hoặc gây ảo giác, nếu sử dụng nhiều lần có thể dẫn tới tình trạng nghiện đối với người sử dụng được gọi là:", ops: ["chất gây nghiện", "chất hướng thần", "chất chống viêm", "chất an thần"] },
        { q: "4. Loại cây nào dưới đây không có chứa chất ma túy?", ops: ["Cây xuyên tâm liên", "Cây Côca", "Cây thuốc phiện", "Cây cần sa"] },
        { q: "5. Hành vi nào dưới đây không bị nghiêm cấm trong phòng, chống ma túy?", ops: ["Giáo dục pháp luật về phòng, chống ma túy", "Trồng cây có chứa chất ma túy", "Cưỡng bức, lôi kéo người khác sử dụng ma túy", "Sản xuất, vận chuyển ma túy"] },
        { q: "6. Hành vi nào dưới đây không bị nghiêm cấm trong phòng, chống ma túy?", ops: ["Bạn T tham gia công tác tuyên truyền về tác hại của ma túy", "Anh K tham gia vận chuyển, tàng trữ ma túy", "Bà S trồng cây cần sa", "Anh P lôi kéo em C sử dụng ma túy"] },
        { q: "7. Trong việc phòng, chống ma túy, các cá nhân có trách nhiệm như thế nào?", ops: ["Cung cấp kịp thời thông tin về tội phạm", "Cản trở việc xét nghiệm ma túy", "Cản trở người tham gia phòng chống ma túy", "Lôi kéo người khác sử dụng ma túy"] },
        { q: "9. Tình huống: Bố mẹ G trồng cây thuốc phiện để làm thuốc uống khi đau bụng. Hành vi này là gì?", ops: ["Trồng cây có chứa chất ma túy", "Sản xuất ma túy", "Chống lại xét nghiệm ma túy", "Lôi kéo người khác sử dụng"] },
        { q: "10. Quá trình nghiện ma túy thường trải qua những giai đoạn nào?", ops: ["Sử dụng ma túy => lạm dụng ma túy => lệ thuộc ma túy", "Lạm dụng ma túy => sử dụng ma túy => lệ thuộc ma túy", "Lệ thuộc ma túy => sử dụng ma túy => lạm dụng ma túy", "Sử dụng ma túy => lệ thuộc ma túy => lạm dụng ma túy"] },
        { q: "11. Ma túy gây tác hại như thế nào đối với bản thân người nghiện?", ops: ["Gây tổn hại về sức khỏe thể chất và tinh thần", "Lực lượng lao động xã hội bị suy giảm", "Nguồn vốn đầu tư suy giảm", "Xã hội kém an toàn"] },
        { q: "12. Ma túy gây tác hại như thế nào đối với nền kinh tế?", ops: ["Nguồn vốn đầu tư nước ngoài bị suy giảm", "Gây tổn hại sức khỏe thể chất", "Hạnh phúc gia đình rạn nứt", "Xã hội kém an toàn"] },
        { q: "13. Một trong những nguyên nhân chủ quan dẫn đến nghiện ma túy là do:", ops: ["sự tò mò, “chơi trội”, lối sống buông thả", "thiếu sự quan tâm của gia đình", "công tác tuyên truyền chưa hiệu quả", "chế tài xử phạt chưa đủ răn đe"] },
        { q: "14. Nội dung nào dưới đây không phản ánh đúng dấu hiệu nhận biết học sinh nghiện ma túy?", ops: ["Cơ thể đầy đặn, khỏe mạnh, học lực tốt", "Bị toát mồ hôi, ngáp vặt, da xanh tái", "Hay lo sợ, hoảng tưởng", "Cất giấu chất ma túy"] },
        { q: "15. Khi phát hiện người thân/bạn bè sử dụng ma túy, em nên:", ops: ["Nhanh chóng báo cho cơ quan chức năng", "Im lặng che dấu", "Chất vấn người thân", "Im lặng không quan tâm"] },
        { q: "16. Hành vi nào bị nghiêm cấm khi tham gia giao thông?", ops: ["Đua xe, cổ vũ đua xe trái phép", "Đội mũ bảo hiểm", "Bật đèn tín hiệu", "Lắp đặt, sử dụng còi đèn đúng thiết kế"] },
        { q: "17. Nội dung nào không phản ánh đúng nguyên tắc giao thông?", ops: ["Không bật đèn tín hiệu khi chuyển làn đường", "Đi về bên phải", "Đi đúng làn đường", "Chấp hành báo hiệu đường bộ"] },
        { q: "18. Tại nơi có vạch kẻ đường dành cho người đi bộ, người điều khiển phương tiện phải:", ops: ["giảm tốc độ và nhường đường", "tăng tốc độ", "dừng lại chờ xe khuyết tật", "không cần nhường đường"] },
        { q: "19. Khi vượt xe, xe bị vượt phải:", ops: ["chú ý quan sát, giảm tốc độ và nhường đường", "bật đèn tín hiệu", "tăng tốc", "di chuyển về bên phải"] },
        { q: "20. Xe mô tô chỉ được chở một người, trừ trường hợp:", ops: ["Áp giải người vi phạm pháp luật", "Chở hai người dưới 18 tuổi", "Chở hai người trên 16 tuổi", "Chở một người lớn một trẻ em"] },
        { q: "21. Người điều khiển xe mô tô, xe gắn máy phải:", ops: ["đội mũ bảo hiểm cài quai", "đi vào đường người đi bộ", "đi vào đường phương tiện khác", "đội mũ không cài quai"] },
        { q: "22. Khi tham gia giao thông, người đi bộ không được:", ops: ["Đu bám vào phương tiện đang chạy", "Đi trên hè phố", "Qua đường nơi có vạch kẻ", "Tuân thủ biển báo"] },
        { q: "25. Trong tình huống bạn P đi đò không mặc áo phao, ai vi phạm?", ops: ["Bạn P", "Bác lái đò", "Cả hai", "Không ai vi phạm"] },
        { q: "26. Trong phòng chống vi phạm ATGT, học sinh không có trách nhiệm nào?", ops: ["Ban hành chính sách xử lý vi phạm", "Tự giác tuân thủ pháp luật", "Giúp đỡ người khác an toàn", "Vận động người thân thực hiện"] },
        { q: "32. Sự ổn định, phát triển của chế độ XHCN và nhà nước... là nội dung của:", ops: ["An ninh quốc gia", "Bảo vệ an ninh quốc gia", "Trật tự, an toàn xã hội", "Bảo đảm trật tự, an toàn xã hội"] },
        { q: "33. ... là phòng ngừa, phát hiện, đấu tranh làm thất bại các hoạt động xâm phạm an ninh quốc gia:", ops: ["Bảo vệ an ninh quốc gia", "An ninh quốc gia", "Trật tự, an toàn xã hội", "Bảo đảm trật tự xã hội"] },
        { q: "34. Trạng thái xã hội bình yên, mọi người được sống yên trên cơ sở chuẩn mực pháp lí là:", ops: ["Trật tự, an toàn xã hội", "An ninh quốc gia", "Bảo vệ an ninh quốc gia", "Bảo đảm trật tự xã hội"] },
        { q: "35. ... là phòng ngừa, phát hiện, đấu tranh chống tội phạm và vi phạm pháp luật về trật tự, an toàn xã hội:", ops: ["Bảo đảm trật tự, an toàn xã hội", "An ninh quốc gia", "Bảo vệ an ninh quốc gia", "Trật tự, an toàn xã hội"] },
        { q: "36. Đảm bảo trật tự, an toàn xã hội không bao gồm:", ops: ["Bảo vệ an ninh tư tưởng, dân tộc, tôn giáo", "Giữ gìn trật tự công cộng", "Đấu tranh phòng chống tội phạm", "Phòng chống thiên tai, dịch bệnh"] },
        { q: "37. Bảo vệ an ninh quốc gia không bao gồm:", ops: ["Bảo vệ quyền trẻ em", "Bảo vệ an ninh chính trị", "Bảo vệ an ninh con người", "Bảo vệ an ninh kinh tế"] },
        { q: "38. Trách nhiệm của Đảng trong bảo vệ an ninh quốc gia:", ops: ["Lãnh đạo trực tiếp, tuyệt đối", "Giữ vai trò nòng cốt", "Tố cáo hành vi vi phạm", "Cung cấp thông tin"] },
        { q: "39. Cơ quan quyết định chiến tranh và hoà bình, ban hành Hiến pháp:", ops: ["Quốc hội", "Chính phủ", "Mặt trận Tổ quốc", "Tòa án"] },
        { q: "40. Cơ quan tổ chức thi hành Hiến pháp và quản lí thống nhất:", ops: ["Chính phủ", "Quốc hội", "Mặt trận Tổ quốc", "Tòa án"] },
        { q: "41. LLVT nhân dân trong bảo vệ an ninh quốc gia giữ vai trò:", ops: ["nòng cốt", "xung kích", "lãnh đạo trực tiếp", "lãnh đạo tuyệt đối"] },
        { q: "42. Trách nhiệm của công dân trong bảo vệ an ninh:", ops: ["Chấp hành chủ trương của Đảng", "Bảo vệ an ninh chính trị nội bộ", "Thi hành Hiến pháp", "Quyết định vấn đề chiến tranh"] },
        { q: "43. Nội dung nào không phải trách nhiệm của công dân:", ops: ["Tổ chức thi hành Hiến pháp", "Chấp hành chủ trương", "Tố cáo hành vi vi phạm", "Cộng tác với công an"] },
        { q: "44. Trách nhiệm của học sinh trong bảo vệ an ninh:", ops: ["Gương mẫu thực hiện nội quy nhà trường", "Bảo vệ an ninh chính trị nội bộ", "Thi hành Hiến pháp", "Quyết định chiến tranh"] },
        { q: "45. Hoạt động thuộc bảo vệ an ninh biên giới:", ops: ["Kiểm tra cột mốc biên giới", "Bảo vệ lãnh đạo", "Tuyên truyền rác thải", "Dọn rác bãi biển"] },
        { q: "46. Tố cáo hành vi vi phạm... là trách nhiệm của:", ops: ["công dân", "Quốc hội", "Chính phủ", "lực lượng vũ trang"] },
        { q: "47. Môi trường thông tin truyền đưa qua mạng viễn thông là:", ops: ["Không gian mạng", "Mạng", "An ninh mạng", "Bảo vệ an ninh mạng"] },
        { q: "48. ... là mạng lưới kết nối của cơ sở hạ tầng công nghệ thông tin:", ops: ["mạng", "không gian mạng", "an ninh mạng", "bảo vệ an ninh mạng"] },
        { q: "49. Sự bảo đảm hoạt động trên không gian mạng không gây phương hại đến an ninh quốc gia là:", ops: ["An ninh mạng", "Mạng", "Không gian mạng", "Bảo vệ an ninh mạng"] },
        { q: "51. Hành vi bị nghiêm cấm trên không gian mạng:", ops: ["Xuyên tạc lịch sử", "Đăng tải ảnh cá nhân", "Tra cứu thông tin", "Tương tác người thân"] },
        { q: "52. Hành vi không bị cấm trên không gian mạng:", ops: ["Tra cứu thông tin", "Xuyên tạc lịch sử", "Bịa đặt thông tin", "Đánh bạc"] },
        { q: "54. Trên không gian mạng, trẻ em có quyền:", ops: ["được bảo vệ, tiếp cận thông tin", "kích động phạm tội", "tấn công mạng", "đánh bạc"] },
        { q: "56. Quy tắc ứng xử chung trên mạng xã hội không bao gồm:", ops: ["Phát tán thông tin giả", "An toàn bảo mật", "Tôn trọng pháp luật", "Lành mạnh, trách nhiệm"] },
        { q: "57. Thông tin nào không thuộc thông tin cá nhân:", ops: ["Sở thích", "Họ tên", "Ngày sinh", "Nghề nghiệp"] },
        { q: "58. Nội dung nào không thuộc bí mật cá nhân:", ops: ["Nghề nghiệp", "Hồ sơ y tế", "Số thẻ tín dụng", "Hồ sơ thuế"] },
        { q: "59. Biện pháp bảo mật thông tin cá nhân:", ops: ["sử dụng phần mềm chống virus", "chia sẻ thông tin lên mạng", "đặt mật khẩu dễ nhớ", "sử dụng wifi công cộng"] },
        { q: "60. Tình huống H nhận tin nhắn lăng mạ, ai không vi phạm?", ops: ["Bạn H và chị gái", "H và M", "Chị gái và M", "H, chị gái và M"] },
        { q: "61. Tình huống A đăng bí mật của V lên facebook, ai vi phạm?", ops: ["Bạn A", "Bạn V", "Cả hai", "Không ai vi phạm"] }
    ];

    const quizDiv = document.getElementById('quiz');
    const correctAnswers = [];

    // Xáo trộn mảng
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    data.forEach((item, index) => {
        const correct = item.ops[0];
        correctAnswers.push(correct);
        const shuffledOps = shuffle([...item.ops]);

        let html = `<div class="question">
            <p><strong>${item.q}</strong></p>
            <div class="options">`;
        
        shuffledOps.forEach(op => {
            html += `<label><input type="radio" name="q${index}" value="${op}"> ${op}</label>`;
        });
        
        html += `</div></div>`;
        quizDiv.innerHTML += html;
    });

    function checkAnswers() {
        let score = 0;
        const resultDiv = document.getElementById('result');
        
        data.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const qDiv = document.querySelectorAll('.question')[index];
            
            if (selected) {
                if (selected.value === correctAnswers[index]) {
                    score++;
                    qDiv.style.background = "#d4edda";
                } else {
                    qDiv.style.background = "#f8d7da";
                }
            } else {
                qDiv.style.background = "#fff3cd";
            }
        });
        
        resultDiv.innerHTML = `Bạn đã đạt: ${score}/${data.length} điểm.`;
        window.scrollTo(0, 0);
    }
</script>

</body>
</html>
