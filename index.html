<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ôn thi QP-AN</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
    margin:0;
    padding:20px;
}

.container {
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1 {
    text-align:center;
}

.question {
    margin:20px 0;
    padding:15px;
    border-radius:10px;
    background:#f8f9fa;
    transition:0.3s;
}

.question:hover {
    background:#e3f2fd;
}

label {
    display:block;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
}

label:hover {
    background:#d0ebff;
}

button {
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#28a745;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover {
    background:#218838;
}

#result {
    margin-top:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h1>ÔN THI QP-AN</h1>

<div id="quiz"></div>

<button onclick="check()">NỘP BÀI</button>

<div id="result"></div>
</div>

{ q:"2. Chất gây nghiện là:", ops:["Chất kích thích hoặc ức chế thần kinh, dễ gây nghiện.","Chất gây ảo giác nhưng không nghiện.","Chất giảm đau.","Chất hỗ trợ tiêu viêm."] },
{ q:"3. Chất kích thích hoặc ức chế thần kinh gây nghiện gọi là:", ops:["chất hướng thần.","chất gây nghiện.","chất chống viêm.","chất an thần."] },
{ q:"4. Loại cây không chứa ma túy:", ops:["Cây xuyên tâm liên.","Cây Côca.","Cây thuốc phiện.","Cây cần sa."] },
{ q:"5. Hành vi không bị cấm:", ops:["Giáo dục phòng chống ma túy.","Trồng cây ma túy.","Vận chuyển ma túy.","Mua bán ma túy."] },

{ q:"6. Hành vi không bị cấm:", ops:["Tuyên truyền chống ma túy.","Vận chuyển ma túy.","Trồng cần sa.","Lôi kéo sử dụng."] },
{ q:"7. Trách nhiệm cá nhân:", ops:["Cung cấp thông tin.","Cản trở xét nghiệm.","Cản trở phòng chống.","Lôi kéo sử dụng."] },

{ q:"9. Quá trình nghiện:", ops:["Sử dụng→lạm dụng→lệ thuộc.","Sai thứ tự.","Sai.","Sai."] },

{ q:"51. Vi phạm:", ops:["Đua xe.","Đội mũ.","Đèn đỏ.","Đúng làn."] },
{ q:"52. Nên:", ops:["Đội mũ.","Vượt đèn.","Lạng lách.","Điện thoại."] },
{ q:"53. Mục đích:", ops:["Không hại AN.","Chơi.","Chia sẻ.","Tấn công."] },
{ q:"54. HS:", ops:["Học & tuân luật.","Bỏ học.","Vi phạm.","Phá hoại."] },
{ q:"55. Bảo mật:", ops:["Mật khẩu mạnh.","Ngày sinh.","Chia sẻ.","Không đăng xuất."] },

{ q:"56. Không đúng:", ops:["Tin giả.","An toàn.","Pháp luật.","Lành mạnh."] },
{ q:"57. Không phải:", ops:["Sở thích.","Họ tên.","Ngày sinh.","Nghề."] },
{ q:"58. Không bí mật:", ops:["Nghề.","Y tế.","Thẻ.","Thuế."] },
{ q:"59. Bảo mật:", ops:["Chống virus.","Chia sẻ.","Mật khẩu yếu.","Wifi."] },
{ q:"60. Không vi phạm:", ops:["H + chị.","H+M.","chị+M.","3 người."] },
{ q:"61. Vi phạm:", ops:["A.","V.","Cả hai.","Không ai."] }
];

const quiz = document.getElementById("quiz");
let answers = [];

data.forEach((item,i)=>{
    answers.push(item.ops[0]);
    let html = `<div class="question"><b>${item.q}</b>`;
    item.ops.sort(()=>Math.random()-0.5).forEach(op=>{
        html += `<label><input type="radio" name="q${i}" value="${op}"> ${op}</label>`;
    });
    html += "</div>";
    quiz.innerHTML += html;
});

function check(){
    let score=0;
    data.forEach((q,i)=>{
        let s=document.querySelector(`input[name=q${i}]:checked`);
        if(s && s.value===answers[i]) score++;
    });
    document.getElementById("result").innerText="Điểm: "+score+"/"+data.length;
}
</script>

</body>
</html>
